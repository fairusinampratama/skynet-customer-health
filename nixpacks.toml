# Nixpacks Configuration for Skynet Customer Health
# This ensures consistency across Coolify deployments

[phases.setup]
nixPkgs = [
    "php84",
    "php84Packages.composer",
    "php84Extensions.pdo_mysql",
    "php84Extensions.bcmath",
    "php84Extensions.sockets",
    "php84Extensions.xml",
    "php84Extensions.mbstring",
    "php84Extensions.ctype",
    "php84Extensions.curl",
    "php84Extensions.dom",
    "php84Extensions.fileinfo",
    "php84Extensions.filter",
    "php84Extensions.tokenizer",
    "nodejs_20",
    "npm-9_x",
    "python311Packages.supervisor",
    "iputils"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build"
]

[start]
cmd = "php artisan storage:link && php artisan optimize && php artisan migrate --force && /usr/bin/supervisord -c supervisord.conf"
# Note: Path to supervisord might vary in Nix, usually just 'supervisord' works if in PATH.
# We'll use just 'supervisord' and ensure it's in the nixPkgs.
